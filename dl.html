<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Développements Limités</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            pointer-events: auto;
            border: 1px solid #e2e8f0;
            max-height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
        }
        .math-text { font-family: 'Courier New', Courier, monospace; font-weight: bold; }
        
        /* Custom scrollbars */
        .custom-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

<div id="canvas-container">
    <canvas id="graphCanvas"></canvas>
    
    <div id="ui-panel">
        <div class="flex items-center justify-between mb-4 flex-shrink-0">
            <h1 class="text-xl font-bold text-slate-800">Développements Limités</h1>
            <a href="index.html" class="text-sm text-blue-600 hover:underline">Retour</a>
        </div>
        
        <p class="text-sm text-slate-600 mb-4 pb-4 border-b border-slate-200 flex-shrink-0">
            Approximation polynomiale d'une fonction au voisinage de 0. Observez comment le polynôme "épouse" la courbe bleue !
        </p>

        <div class="flex-shrink-0 space-y-4">
            <!-- Sélecteur de fonction -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Fonction f(x)</label>
                <select id="func-select" class="w-full p-2 border border-slate-300 rounded bg-white text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="exp">f(x) = eˣ</option>
                    <option value="sin">f(x) = sin(x)</option>
                    <option value="cos">f(x) = cos(x)</option>
                    <option value="geom">f(x) = 1 / (1 - x)</option>
                </select>
            </div>

            <!-- Curseur Ordre N -->
            <div class="bg-slate-50 p-3 rounded-lg border border-slate-200">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-semibold text-slate-700">Ordre du DL (N)</span>
                    <span class="text-lg font-bold text-red-600" id="val-n">3</span>
                </div>
                <input type="range" id="slider-n" min="0" max="15" step="1" value="3" class="w-full accent-red-500">
            </div>

            <!-- Affichage de la Formule -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Polynôme P<sub id="sub-n">3</sub>(x)</label>
                <div class="p-3 bg-red-50 text-red-700 rounded border border-red-200 overflow-x-auto whitespace-nowrap custom-scroll math-text text-sm">
                    P<sub id="sub-n-inner">3</sub>(x) = <span id="formula-display">1 + x + x²/2 + x³/6</span>
                </div>
            </div>

            <!-- Légende -->
            <div class="text-xs text-slate-500 mt-2 space-y-1">
                <div class="flex items-center"><span class="w-3 h-3 rounded bg-blue-300 mr-2"></span> Vraie fonction f(x)</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded bg-red-500 mr-2"></span> Approximation polynomiale P(x)</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-slate-800 mr-2"></span> Point de tangence en x=0</div>
            </div>

            <button id="btn-reset" class="w-full py-2 px-2 bg-white border border-slate-300 rounded text-sm hover:bg-slate-100 transition mt-2">
                Recentrer la vue
            </button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');

    // Utilitaires mathématiques
    const factCache = {0: 1, 1: 1};
    function fact(n) {
        if (factCache[n]) return factCache[n];
        let res = 1;
        for (let i = 2; i <= n; i++) res *= i;
        factCache[n] = res;
        return res;
    }

    const superscripts = {'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'};
    function toSuperscript(num) {
        return num.toString().split('').map(d => superscripts[d]).join('');
    }

    function joinTerms(terms) {
        if(terms.length === 0) return "0";
        let res = terms[0];
        for(let i=1; i<terms.length; i++) {
            let t = terms[i];
            if(t.startsWith("-")) res += " - " + t.substring(1);
            else if(t.startsWith("+")) res += " + " + t.substring(1);
            else res += " + " + t;
        }
        return res;
    }

    // Définitions des fonctions et de leurs DLs
    const dlFunctions = {
        'exp': {
            fn: Math.exp,
            evalDL: (x, N) => {
                let s = 0;
                for(let i=0; i<=N; i++) s += Math.pow(x, i) / fact(i);
                return s;
            },
            getFormula: (N) => {
                let terms = ["1"];
                if (N >= 1) terms.push("x");
                for (let i = 2; i <= N; i++) terms.push(`x${toSuperscript(i)}/${fact(i)}`);
                return joinTerms(terms);
            }
        },
        'sin': {
            fn: Math.sin,
            evalDL: (x, N) => {
                let s = 0;
                for(let i=0; i<=N; i++) {
                    if (i % 2 !== 0) {
                        let sign = ((i - 1) / 2) % 2 !== 0 ? -1 : 1;
                        s += sign * Math.pow(x, i) / fact(i);
                    }
                }
                return s;
            },
            getFormula: (N) => {
                if (N === 0) return "0";
                let terms = ["x"];
                for (let i = 3; i <= N; i += 2) {
                    let sign = ((i - 1) / 2) % 2 !== 0 ? "-" : "+";
                    terms.push(`${sign}x${toSuperscript(i)}/${fact(i)}`);
                }
                return joinTerms(terms);
            }
        },
        'cos': {
            fn: Math.cos,
            evalDL: (x, N) => {
                let s = 0;
                for(let i=0; i<=N; i++) {
                    if (i % 2 === 0) {
                        let sign = (i / 2) % 2 !== 0 ? -1 : 1;
                        s += sign * Math.pow(x, i) / fact(i);
                    }
                }
                return s;
            },
            getFormula: (N) => {
                let terms = ["1"];
                for (let i = 2; i <= N; i += 2) {
                    let sign = (i / 2) % 2 !== 0 ? "-" : "+";
                    terms.push(`${sign}x${toSuperscript(i)}/${fact(i)}`);
                }
                return joinTerms(terms);
            }
        },
        'geom': {
            fn: (x) => 1 / (1 - x),
            evalDL: (x, N) => {
                let s = 0;
                for(let i=0; i<=N; i++) s += Math.pow(x, i);
                return s;
            },
            getFormula: (N) => {
                let terms = ["1"];
                if (N >= 1) terms.push("x");
                for (let i = 2; i <= N; i++) terms.push(`x${toSuperscript(i)}`);
                return joinTerms(terms);
            }
        }
    };

    // État de l'application
    let currentFunc = 'exp';
    let currentN = 3;

    // Paramètres de vue
    let scale = 100; // Un peu plus grand par défaut pour bien voir autour de 0
    let offsetX = 0;
    let offsetY = 0;
    let width, height, originX, originY;

    // Éléments UI
    const selectFunc = document.getElementById('func-select');
    const sliderN = document.getElementById('slider-n');
    const valN = document.getElementById('val-n');
    const subN1 = document.getElementById('sub-n');
    const subN2 = document.getElementById('sub-n-inner');
    const formulaDisplay = document.getElementById('formula-display');

    function updateFormula() {
        valN.textContent = currentN;
        subN1.textContent = currentN;
        subN2.textContent = currentN;
        formulaDisplay.textContent = dlFunctions[currentFunc].getFormula(currentN);
    }

    selectFunc.addEventListener('change', (e) => {
        currentFunc = e.target.value;
        updateFormula();
        draw();
    });

    sliderN.addEventListener('input', (e) => {
        currentN = parseInt(e.target.value);
        updateFormula();
        draw();
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
        scale = 100;
        offsetX = 0;
        offsetY = 0;
        updateOrigin();
        draw();
    });

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        updateOrigin();
        draw();
    }

    function updateOrigin() {
        originX = width / 2 + offsetX;
        originY = height / 2 + offsetY;
    }

    window.addEventListener('resize', resize);

    function drawGrid() {
        ctx.strokeStyle = '#e2e8f0';
        ctx.lineWidth = 1;
        ctx.font = '12px sans-serif';
        ctx.fillStyle = '#94a3b8';
        
        const step = scale;

        // Verticales
        let startX = (originX % step) - step;
        for (let x = startX; x < width + step; x += step) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
            let mathX = Math.round((x - originX) / scale);
            if (mathX !== 0 && originY > 0 && originY < height) {
                ctx.fillText(mathX, x + 5, originY + 15);
            }
        }

        // Horizontales
        let startY = (originY % step) - step;
        for (let y = startY; y < height + step; y += step) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
            let mathY = Math.round((originY - y) / scale);
            if (mathY !== 0 && originX > 0 && originX < width) {
                ctx.fillText(mathY, originX + 5, y - 5);
            }
        }

        // Axes principaux
        ctx.strokeStyle = '#94a3b8';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, originY); ctx.lineTo(width, originY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(originX, 0); ctx.lineTo(originX, height); ctx.stroke();
        
        if (originX > 0 && originX < width && originY > 0 && originY < height) {
            ctx.fillText('0', originX + 5, originY + 15);
        }
    }

    function drawCurve(evalFunc, color, lineWidth, isDashed = false) {
        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth;
        if (isDashed) ctx.setLineDash([8, 8]);
        else ctx.setLineDash([]);
        
        ctx.beginPath();
        let isDrawing = false;
        let prevY = null;

        for (let px = 0; px <= width; px += 2) {
            let mathX = (px - originX) / scale;
            let mathY = evalFunc(mathX);
            
            if (isNaN(mathY)) {
                isDrawing = false;
                prevY = null;
                continue;
            }

            let py = originY - mathY * scale;

            // Coupure pour les asymptotes (très utile pour 1/(1-x))
            if (prevY !== null && Math.abs(py - prevY) > height / 2) {
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(px, py);
            } else if (!isDrawing) {
                ctx.moveTo(px, py);
                isDrawing = true;
            } else {
                ctx.lineTo(px, py);
            }
            prevY = py;
        }
        ctx.stroke();
        ctx.setLineDash([]);
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);
        drawGrid();
        
        const funcData = dlFunctions[currentFunc];

        // 1. Tracer la vraie fonction (bleu clair, épaisse)
        drawCurve(funcData.fn, '#93C5FD', 6);

        // 2. Tracer le DL (rouge, trait continu)
        drawCurve((x) => funcData.evalDL(x, currentN), '#EF4444', 3);

        // 3. Dessiner le point d'ancrage en x=0
        let originFnY = originY - funcData.fn(0) * scale;
        ctx.fillStyle = '#1E293B';
        ctx.beginPath();
        ctx.arc(originX, originFnY, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    // Gestion du Pan (Déplacement)
    let isDragging = false;
    let lastMouseX = 0;
    let lastMouseY = 0;
    const container = document.getElementById('canvas-container');

    container.addEventListener('mousedown', (e) => {
        isDragging = true;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
    });

    window.addEventListener('mouseup', () => isDragging = false);

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        offsetX += e.clientX - lastMouseX;
        offsetY += e.clientY - lastMouseY;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
        updateOrigin();
        draw();
    });

    // Gestion du Zoom
    container.addEventListener('wheel', (e) => {
        e.preventDefault();
        const zoomIntensity = 0.1;
        const mouseX = e.clientX;
        const mouseY = e.clientY;

        const mathX = (mouseX - originX) / scale;
        const mathY = (originY - mouseY) / scale;

        if (e.deltaY < 0) scale *= (1 + zoomIntensity);
        else scale *= (1 - zoomIntensity);

        scale = Math.max(10, Math.min(scale, 1000));

        offsetX = mouseX - width / 2 - mathX * scale;
        offsetY = mouseY - height / 2 + mathY * scale;

        updateOrigin();
        draw();
    }, { passive: false });

    // Initialisation
    updateFormula();
    resize();

</script>

</body>
</html>
