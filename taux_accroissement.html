<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dérivée et Taux d'Accroissement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            pointer-events: auto;
            border: 1px solid #e2e8f0;
            max-height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
        }
        .math-text { font-family: 'Courier New', Courier, monospace; font-weight: bold; }
        
        /* Custom scrollbars */
        .custom-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

<div id="canvas-container">
    <canvas id="graphCanvas"></canvas>
    
    <div id="ui-panel">
        <div class="flex items-center justify-between mb-4 flex-shrink-0">
            <h1 class="text-xl font-bold text-slate-800">Taux d'Accroissement</h1>
            <a href="index.html" class="text-sm text-blue-600 hover:underline">Retour</a>
        </div>
        
        <p class="text-sm text-slate-600 mb-4 pb-4 border-b border-slate-200 flex-shrink-0">
            Observez la sécante devenir la tangente lorsque l'écart <span class="math-text text-purple-600">h</span> se rapproche de 0.
        </p>

        <div class="flex-shrink-0 space-y-4">
            <!-- Sélecteur de fonction -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Fonction f(x)</label>
                <select id="func-select" class="w-full p-2 border border-slate-300 rounded bg-white text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="sq">f(x) = x²</option>
                    <option value="cb">f(x) = x³/3 - x</option>
                    <option value="sin">f(x) = sin(x)</option>
                    <option value="exp">f(x) = eˣ</option>
                </select>
            </div>

            <!-- Curseur Point A -->
            <div class="bg-slate-50 p-3 rounded-lg border border-slate-200">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-semibold text-slate-700">Point fixe (a)</span>
                    <span class="text-md font-bold text-blue-600" id="val-a">1.0</span>
                </div>
                <input type="range" id="slider-a" min="-5" max="5" step="0.1" value="1" class="w-full accent-blue-500">
            </div>

            <!-- Curseur h (écart) -->
            <div class="bg-purple-50 p-3 rounded-lg border border-purple-200">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-semibold text-purple-800">Écart (h)</span>
                    <span class="text-md font-bold text-purple-600" id="val-h">2.0</span>
                </div>
                <input type="range" id="slider-h" min="-4" max="4" step="0.05" value="2" class="w-full accent-purple-500">
            </div>

            <!-- Affichage des calculs -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Calcul du taux d'accroissement</label>
                <div class="p-3 bg-white rounded border border-slate-200 math-text text-sm space-y-2" id="math-display">
                    <!-- Généré dynamiquement -->
                </div>
            </div>

            <!-- Légende -->
            <div class="text-xs text-slate-500 mt-2 space-y-1">
                <div class="flex items-center"><span class="w-3 h-3 rounded bg-blue-300 mr-2"></span> Courbe de f(x)</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded bg-blue-600 mr-2"></span> Point A (a, f(a))</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded bg-purple-500 mr-2"></span> Point M (a+h, f(a+h))</div>
                <div class="flex items-center"><span class="w-3 h-3 rounded bg-emerald-500 mr-2"></span> Droite sécante / Tangente</div>
            </div>

            <button id="btn-reset" class="w-full py-2 px-2 bg-white border border-slate-300 rounded text-sm hover:bg-slate-100 transition mt-2">
                Recentrer la vue
            </button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');

    // Dictionnaire des fonctions
    const functions = {
        'sq': { fn: x => x * x, d: x => 2 * x, str: 'x²' },
        'cb': { fn: x => (x * x * x) / 3 - x, d: x => x * x - 1, str: 'x³/3 - x' },
        'sin': { fn: x => Math.sin(x), d: x => Math.cos(x), str: 'sin(x)' },
        'exp': { fn: x => Math.exp(x), d: x => Math.exp(x), str: 'eˣ' }
    };

    // État de l'application
    let currentFunc = 'sq';
    let paramA = 1.0;
    let paramH = 2.0;

    // Paramètres de vue
    let scale = 80;
    let offsetX = 0;
    let offsetY = 100; // Légèrement décalé vers le bas au départ
    let width, height, originX, originY;

    // Éléments UI
    const selectFunc = document.getElementById('func-select');
    const sliderA = document.getElementById('slider-a');
    const sliderH = document.getElementById('slider-h');
    const valA = document.getElementById('val-a');
    const valH = document.getElementById('val-h');
    const mathDisplay = document.getElementById('math-display');

    function updateMath() {
        valA.textContent = paramA.toFixed(2);
        valH.textContent = paramH.toFixed(2);
        
        const func = functions[currentFunc];
        const fa = func.fn(paramA);
        const fah = func.fn(paramA + paramH);
        
        let slope, expression;

        if (Math.abs(paramH) < 0.001) {
            // H est zéro, on est sur la dérivée exacte
            slope = func.d(paramA);
            mathDisplay.innerHTML = `
                <div class="text-emerald-600 font-bold mb-1">h = 0 ! (Tangente)</div>
                <div>f'(<span class="text-blue-600">${paramA.toFixed(2)}</span>) = <span class="text-emerald-600">${slope.toFixed(2)}</span></div>
                <div class="text-xs text-slate-500 font-normal mt-2">
                    Le point M s'est confondu avec A. La sécante est devenue la tangente parfaite.
                </div>
            `;
        } else {
            // Taux d'accroissement normal
            slope = (fah - fa) / paramH;
            const deltaY = fah - fa;
            mathDisplay.innerHTML = `
                <div class="flex items-center text-xs text-slate-500 mb-1">
                    <span class="text-purple-600 font-bold mr-1">Δy</span> / <span class="text-purple-800 font-bold ml-1">h</span>
                </div>
                <div>
                    = (<span class="text-purple-600">${fah.toFixed(2)}</span> - <span class="text-blue-600">${fa.toFixed(2)}</span>) / <span class="text-purple-800">${paramH.toFixed(2)}</span>
                </div>
                <div>
                    = <span class="text-purple-600">${deltaY.toFixed(2)}</span> / <span class="text-purple-800">${paramH.toFixed(2)}</span>
                </div>
                <div class="pt-2 border-t border-slate-100 mt-2 text-emerald-600">
                    Pente sécante = <strong>${slope.toFixed(2)}</strong>
                </div>
            `;
        }
    }

    // Écouteurs d'événements
    selectFunc.addEventListener('change', (e) => { currentFunc = e.target.value; updateMath(); draw(); });
    sliderA.addEventListener('input', (e) => { paramA = parseFloat(e.target.value); updateMath(); draw(); });
    sliderH.addEventListener('input', (e) => { paramH = parseFloat(e.target.value); updateMath(); draw(); });

    document.getElementById('btn-reset').addEventListener('click', () => {
        scale = 80; offsetX = 0; offsetY = 100; updateOrigin(); draw();
    });

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        updateOrigin();
        draw();
    }

    function updateOrigin() {
        originX = width / 2 + offsetX;
        originY = height / 2 + offsetY;
    }

    window.addEventListener('resize', resize);

    function drawGrid() {
        ctx.strokeStyle = '#e2e8f0';
        ctx.lineWidth = 1;
        ctx.font = '12px sans-serif';
        ctx.fillStyle = '#94a3b8';
        
        const step = scale;

        // Verticales
        let startX = (originX % step) - step;
        for (let x = startX; x < width + step; x += step) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
            let mathX = Math.round((x - originX) / scale);
            if (mathX !== 0 && originY > 0 && originY < height) {
                ctx.fillText(mathX, x + 5, originY + 15);
            }
        }

        // Horizontales
        let startY = (originY % step) - step;
        for (let y = startY; y < height + step; y += step) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
            let mathY = Math.round((originY - y) / scale);
            if (mathY !== 0 && originX > 0 && originX < width) {
                ctx.fillText(mathY, originX + 5, y - 5);
            }
        }

        // Axes principaux
        ctx.strokeStyle = '#94a3b8';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, originY); ctx.lineTo(width, originY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(originX, 0); ctx.lineTo(originX, height); ctx.stroke();
        
        if (originX > 0 && originX < width && originY > 0 && originY < height) {
            ctx.fillText('0', originX + 5, originY + 15);
        }
    }

    function drawCurve(evalFunc, color, lineWidth) {
        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth;
        ctx.setLineDash([]);
        
        ctx.beginPath();
        let isDrawing = false;
        let prevY = null;

        for (let px = 0; px <= width; px += 2) {
            let mathX = (px - originX) / scale;
            let mathY = evalFunc(mathX);
            
            if (isNaN(mathY)) continue;

            let py = originY - mathY * scale;

            if (prevY !== null && Math.abs(py - prevY) > height / 2) {
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(px, py);
            } else if (!isDrawing) {
                ctx.moveTo(px, py);
                isDrawing = true;
            } else {
                ctx.lineTo(px, py);
            }
            prevY = py;
        }
        ctx.stroke();
    }

    function drawLine(p1, slope, color, lineWidth) {
        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth;
        ctx.setLineDash([]);
        
        // Trouver deux points très éloignés sur cette droite pour la tracer
        let x1 = -1000;
        let y1 = p1.y + slope * (x1 - p1.x);
        
        let x2 = 1000;
        let y2 = p1.y + slope * (x2 - p1.x);

        ctx.beginPath();
        ctx.moveTo(originX + x1 * scale, originY - y1 * scale);
        ctx.lineTo(originX + x2 * scale, originY - y2 * scale);
        ctx.stroke();
    }

    function draw() {
        ctx.clearRect(0, 0, width, height);
        drawGrid();
        
        const funcData = functions[currentFunc];

        // 1. Tracer la fonction
        drawCurve(funcData.fn, '#93C5FD', 4);

        const a = paramA;
        const fa = funcData.fn(a);
        const a_h = a + paramH;
        const fah = funcData.fn(a_h);

        // Position à l'écran
        const pA_screen = { x: originX + a * scale, y: originY - fa * scale };
        const pM_screen = { x: originX + a_h * scale, y: originY - fah * scale };

        let slope;
        
        if (Math.abs(paramH) < 0.001) {
            // Tangente (h=0)
            slope = funcData.d(a);
            drawLine({x: a, y: fa}, slope, '#10B981', 3); // Vert
        } else {
            // Sécante
            slope = (fah - fa) / paramH;
            drawLine({x: a, y: fa}, slope, '#10B981', 2); // Vert plus fin
            
            // Triangle du taux d'accroissement (h et Δy)
            ctx.strokeStyle = '#A855F7'; // Violet clair
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            ctx.moveTo(pA_screen.x, pA_screen.y);
            ctx.lineTo(pM_screen.x, pA_screen.y); // Trait horizontal (h)
            ctx.lineTo(pM_screen.x, pM_screen.y); // Trait vertical (Δy)
            ctx.stroke();
            ctx.setLineDash([]);

            // Labels sur le triangle
            ctx.fillStyle = '#7E22CE';
            ctx.font = 'bold 14px sans-serif';
            
            // Placer le "h"
            const hMidX = (pA_screen.x + pM_screen.x) / 2;
            ctx.fillText('h', hMidX, pA_screen.y + (paramH > 0 ? 15 : -10));

            // Placer le "Δy"
            const dyMidY = (pA_screen.y + pM_screen.y) / 2;
            ctx.fillText('Δy', pM_screen.x + (paramH > 0 ? 10 : -25), dyMidY);
            
            // 3. Dessiner le point M
            ctx.fillStyle = '#A855F7';
            ctx.beginPath(); ctx.arc(pM_screen.x, pM_screen.y, 6, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
            
            // Label M
            ctx.fillStyle = '#7E22CE';
            ctx.fillText('M', pM_screen.x + 10, pM_screen.y - 10);
        }

        // 4. Dessiner le point A (par-dessus la sécante)
        ctx.fillStyle = '#2563EB'; // Bleu fort
        ctx.beginPath(); ctx.arc(pA_screen.x, pA_screen.y, 6, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
        
        // Label A
        ctx.fillStyle = '#1D4ED8';
        ctx.font = 'bold 14px sans-serif';
        ctx.fillText('A', pA_screen.x - 20, pA_screen.y - 10);
    }

    // Gestion du Pan (Déplacement)
    let isDragging = false;
    let lastMouseX = 0;
    let lastMouseY = 0;
    const container = document.getElementById('canvas-container');

    container.addEventListener('mousedown', (e) => {
        isDragging = true;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
    });

    window.addEventListener('mouseup', () => isDragging = false);

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        offsetX += e.clientX - lastMouseX;
        offsetY += e.clientY - lastMouseY;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
        updateOrigin();
        draw();
    });

    // Gestion du Zoom
    container.addEventListener('wheel', (e) => {
        e.preventDefault();
        const zoomIntensity = 0.1;
        const mouseX = e.clientX;
        const mouseY = e.clientY;

        const mathX = (mouseX - originX) / scale;
        const mathY = (originY - mouseY) / scale;

        if (e.deltaY < 0) scale *= (1 + zoomIntensity);
        else scale *= (1 - zoomIntensity);

        scale = Math.max(10, Math.min(scale, 1000));

        offsetX = mouseX - width / 2 - mathX * scale;
        offsetY = mouseY - height / 2 + mathY * scale;

        updateOrigin();
        draw();
    }, { passive: false });

    // Initialisation
    updateMath();
    resize();

</script>

</body>
</html>
